<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BP RX Sticker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>BP RX Sticker</h1>
      <p class="subtitle">SSCC Scan In · 1 scan = 1 label</p>

      <label class="checkbox">
        <input id="enabled" type="checkbox" />
        Listening for scans
      </label>

      <p id="bridgeStatus" class="status" aria-live="polite"></p>

      <section id="lastResult" class="last-result hidden">
        <h2>Last scan</h2>
        <div id="lastResultBody"></div>
        <button id="reprint" type="button" class="reprint">Reprint label</button>
      </section>

      <p id="actionStatus" class="status" aria-live="polite"></p>

      <button id="openSettings" type="button" class="secondary">Settings & diagnostics…</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
