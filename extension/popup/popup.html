<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BP RX Sticker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>BP RX Sticker</h1>
      <p class="subtitle">SSCC Scan In only · 1 scan = 1 label</p>

      <label>
        API URL
        <input id="apiUrl" type="url" spellcheck="false" />
      </label>

      <label>
        Recent invoice window (hours)
        <input id="hours" type="number" min="1" max="168" />
      </label>
      <p id="hoursHint" class="hint"></p>

      <label class="checkbox">
        <input id="enabled" type="checkbox" />
        Listen for OneScan scans
      </label>

      <label class="checkbox">
        <input id="mockPrint" type="checkbox" />
        Mock print (lookup only — no label sent to printer)
      </label>

      <label>
        Printer IP
        <input id="printerIp" type="text" spellcheck="false" placeholder="172.18.129.132" />
      </label>

      <label>
        Print bridge URL
        <input id="printBridgeUrl" type="url" spellcheck="false" placeholder="http://127.0.0.1:9101/print" />
      </label>

      <p class="hint">Windows: run <code>extension/print-bridge/install-windows.bat</code> as Admin for auto-start at logon.</p>

      <button id="save">Save settings</button>
      <button id="ping" type="button" class="secondary">Check OneScan connection</button>
      <button id="checkBridge" type="button" class="secondary">Check print bridge</button>
      <button id="testScan" type="button" class="secondary">Test via OneScan tab</button>
      <button id="testApi" type="button" class="secondary">Test API directly</button>
      <button id="testPrint" type="button" class="secondary">Test network print</button>
      <p class="hint">Only active on OneScan → SSCC Scan In (<code>#/ssccScanIn</code>).</p>
      <p id="connectionStatus" class="status" aria-live="polite"></p>
      <p id="bridgeStatus" class="status" aria-live="polite"></p>
      <p id="saveStatus" class="status" aria-live="polite"></p>

      <section id="lastResult" class="last-result hidden">
        <h2>Last scan</h2>
        <div id="lastResultBody"></div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
